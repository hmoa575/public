<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Formulario de consulta</title>
</head>
<body>
    <h1>Formulario de consulta</h1>
    <form action="recibido.html" method="get">
        <p>
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" >
        </p>
        <p>
            <label for="apellido">Apellido:</label><br>
            <input type="text" id="apellido" name="apellido" required>
        </p>
        <p>
            <label for="edad">Edad:</label><br>
            <input type="number" id="edad" name="edad" min="18" max="120" placeholder="18 - 120" required>
        </p>
        <p>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
        </p>
        <p>
            <label for="fecha">Fecha:</label><br>
            <input type="date" id="fecha" name="fecha">
        </p>
        <p>
            <label for="asunto">Asunto:</label><br>
            <input type="text" id="asunto" name="asunto" required>
        </p>
        <p>
            <label for="comentario">Comentario (máximo 150 caracteres):</label><br>
            <textarea id="comentario" name="comentario" maxlength="150" rows="4" cols="50"></textarea>
        </p>
        <button type="submit">Enviar consulta</button>
    </form>
</body>
</html>
