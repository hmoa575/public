<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mensaje recibido</title>
     <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .confirmation-card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 100%;
            text-align: center;
            padding: 2.5rem 2rem;
            transition: transform 0.2s;
        }

        .confirmation-card:hover {
            transform: scale(1.01);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            color: #4a5568;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 1.8rem;
        }

        .data-info {
            background: #f7fafc;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            word-break: break-all;
            margin: 1rem 0;
            text-align: left;
            font-family: monospace;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <h1>¡Mensaje recibido!</h1>
    <p>Gracias por contactarte con nosotros. Tu consulta ha sido enviada correctamente.</p>
    <p><a href="formulario.html">Volver al formulario</a></p>
</body>

</html>
