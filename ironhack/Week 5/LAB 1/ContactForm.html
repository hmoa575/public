<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="responsive" content="true">
    <link rel="stylesheet" href="ContactForm.css">
    <title>Formulario de Contacto</title>
</head>
<body>

    <header>
        <h1>Formulario de Contacto</h1>
    </header>
    <div class="formContainer">
    <form action="recibido.html" method="get">
        <label for="nombre">Nombre</label><br>
        <input type="text" id="nombre" name="nombre" required><br>
        <label for="apellido">Apellido</label><br>
        <input type="text" id="apellido" name="apellido" required><br>
        <label for="fecNacimiento">Fecha de Nacimiento</label><br>
        <input type="date" id="fecNacimiento" name="fecNacimiento"><br>
        <label for="email">Correo Electronico</label><br>
        <input type="email" id="email"  name="email"><br>
        <label for="asunto">Asunto</label><br>
        <input type="text" id="asunto" name="asunto"><br>
        <label for="comentario">Comentario</label><br>
        <textarea name="comentario" id="comentario"></textarea><br>
        <input type="submit" value="submit">
    </form>
    </div>  
</body>
</html>
