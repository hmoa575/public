<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
</head>
<body>
    <table>
        <tr>
            <th>
                <td><strong>#</strong></td>
                <td><strong>Mi animal preferido</strong></td>
            </th>
        </tr>
        <tr>
            <td>1</td>
            <td>Perro</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Gato</td>
        </tr>
    </table>

    <div>
        <h3>DIV</h3>
       <p>
Define una división o sección en un documento html.
Se usa como contenedor de otros elementos html.
Facilita el uso de estilos CSS a partir de asignarle una clase o id
</p> 
    </div>
</body>
</html>
