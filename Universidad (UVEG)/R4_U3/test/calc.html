<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculadora básica</title>

  <style>
    /* ====== Selector de elemento ====== */
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0f172a; /* azul oscuro */
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #e2e8f0;
    }

    /* ====== Selector de id ====== */
    #app {
      width: min(360px, 92vw);
    }

    /* ====== Selector de clase ====== */
    .calc {
      background: #111827;          /* fondo calculadora */
      border: 1px solid #334155;    /* borde general */
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 20px;              /* tamaño de fuente */
      letter-spacing: 0.3px;
      color: #f8fafc;               /* color de texto */
      text-align: center;
    }

    /* Pantalla */
    #pantalla {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 10px;
      font-size: 28px;
      text-align: right;
      border-radius: 10px;
      border: 1px solid #475569;    /* borde pantalla */
      background: #0b1220;          /* background pantalla */
      color: #e2e8f0;
      outline: none;
      margin-bottom: 12px;
    }

    .teclado {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      font-size: 18px;
      padding: 12px 10px;
      border-radius: 10px;
      border: 1px solid #334155;    /* borde botones */
      background: #1f2937;          /* background botones */
      color: #e5e7eb;
      cursor: pointer;
      transition: transform 0.04s ease, background 0.15s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    /* Clases para diferenciar estilos */
    .btn-op {
      background: #24324a;
      color: #e2e8f0;
    }

    .btn-accion {
      background: #3b1d2c; /* para C */
      border-color: #7f1d1d;
    }

    .btn-igual {
      background: #14532d;
      border-color: #166534;
      grid-column: span 2; /* "=" más ancho */
    }

    .btn-cero {
      grid-column: span 2; /* 0 más ancho */
    }

    /* Hover (opcional) */
    button:hover {
      background: #273449;
    }
    .btn-op:hover { background: #2b3b57; }
    .btn-accion:hover { background: #4a2134; }
    .btn-igual:hover { background: #166534; }
  </style>
</head>

<body>
  <div id="app">
    <div class="calc">
      <h1>Calculadora básica</h1>

      <!-- Pantalla: puede ser input o div; aquí usamos input para facilidad -->
      <input id="pantalla" type="text" value="0" readonly />

      <div class="teclado">
        <!-- Fila 1 -->
        <button class="btn-accion" data-accion="limpiar">C</button>
        <button class="btn-op" data-op="/">÷</button>
        <button class="btn-op" data-op="*">×</button>
        <button class="btn-op" data-op="-">−</button>

        <!-- Fila 2 -->
        <button data-num="7">7</button>
        <button data-num="8">8</button>
        <button data-num="9">9</button>
        <button class="btn-op" data-op="+">+</button>

        <!-- Fila 3 -->
        <button data-num="4">4</button>
        <button data-num="5">5</button>
        <button data-num="6">6</button>
        <button class="btn-igual" data-accion="resultado">=</button>

        <!-- Fila 4 -->
        <button data-num="1">1</button>
        <button data-num="2">2</button>
        <button data-num="3">3</button>
        <button class="btn-cero" data-num="0">0</button>
      </div>
    </div>
  </div>

  <script>
    // Estado de la calculadora
    let numeroActual = "0";
    let numeroPrevio = null;
    let operacion = null;
    let esperandoSiguiente = false;

    const pantalla = document.getElementById("pantalla");
    const teclado = document.querySelector(".teclado");

    function actualizarPantalla(valor) {
      pantalla.value = valor;
    }

    function limpiarTodo() {
      numeroActual = "0";
      numeroPrevio = null;
      operacion = null;
      esperandoSiguiente = false;
      actualizarPantalla("0");
    }

    function ingresarNumero(digito) {
      if (esperandoSiguiente) {
        numeroActual = digito;          // inicia el siguiente número
        esperandoSiguiente = false;
      } else {
        numeroActual = (numeroActual === "0") ? digito : (numeroActual + digito);
      }
      actualizarPantalla(numeroActual);
    }

    function seleccionarOperacion(op) {
      // Si ya hay una operación y se estaba esperando el siguiente número,
      // solo se cambia la operación (comportamiento típico de calculadora)
      if (operacion && esperandoSiguiente) {
        operacion = op;
        return;
      }

      if (numeroPrevio === null) {
        numeroPrevio = Number(numeroActual);
      } else if (operacion) {
        // Encadenar operaciones: 2 + 3 + 4 ...
        const calculado = calcular(numeroPrevio, Number(numeroActual), operacion);
        numeroPrevio = calculado;
        actualizarPantalla(String(calculado));
      }

      operacion = op;
      esperandoSiguiente = true; // esperar el siguiente número
    }

    function calcular(a, b, op) {
      switch (op) {
        case "+": return a + b;
        case "-": return a - b;
        case "*": return a * b;
        case "/": return (b === 0) ? "Error" : a / b;
        default: return b;
      }
    }

    function mostrarResultado() {
      if (!operacion || numeroPrevio === null) return;

      const a = numeroPrevio;
      const b = Number(numeroActual);
      const resultado = calcular(a, b, operacion);

      actualizarPantalla(String(resultado));

      // Reset parcial: deja listo para seguir calculando desde el resultado
      numeroActual = String(resultado);
      numeroPrevio = (resultado === "Error") ? null : Number(resultado);
      operacion = null;
      esperandoSiguiente = true; // si se teclea un número, inicia uno nuevo
    }

    teclado.addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      // Números
      if (btn.dataset.num !== undefined) {
        ingresarNumero(btn.dataset.num);
        return;
      }

      // Operaciones
      if (btn.dataset.op) {
        seleccionarOperacion(btn.dataset.op);
        return;
      }

      // Acciones
      if (btn.dataset.accion === "limpiar") {
        limpiarTodo();
        return;
      }

      if (btn.dataset.accion === "resultado") {
        mostrarResultado();
        return;
      }
    });

    // Inicializa
    actualizarPantalla(numeroActual);
  </script>
</body>
</html>
