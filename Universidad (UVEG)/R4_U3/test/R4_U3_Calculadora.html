<body>
<!--Botones para los números del 0 al 9.--> 
   <div class="calculadoraContenedor">
    <h1>R4_U3_Calculadora_Básica</h1>
<!--Pantalla de la calculadora-->
<input type="text" id="calculadoraPantalla" readonly aria-label="Pantalla de resultado" value="0">
<!--Panel de los botones para los números del 0 al 9.-->
<button class="numero" data-digit="7">7</button>
<button class="numero" data-digit="8">8</button>
<button class="numero" data-digit="9">9</button>

<<button class="operador" data-operator="-">-</button>

<button class="numero" data-digit="0">0</button>

<!--Botones para las operaciones: suma, resta, multiplicación y división.
•
Un botón de "Resultado" o "=" para obtener el resultado de la operación.
•
Un botón de "Limpiar" o "C" para reiniciar la operación actual.
•
Una pantalla (puede ser un campo de texto o un div) donde se muestran las operaciones y el resultado.-->
   </div>
<!--
c)
Funcionalidad con JavaScript
Programa la calculadora con las siguientes funcionalidades:
•
Al hacer clic en los botones numéricos, éstos deben aparecer en la pantalla.
•
Al seleccionar una operación, esta debe poder almacenarse y esperar al siguiente número.
•
Al presionar el botón de "Resultado", se debe realizar la operación y mostrar el resultado en la pantalla.
•
La opción de "Limpiar" debe reiniciar cualquier operación y limpiar la pantalla.-->

<script>
// Variables
let currentDisplay = "0";
let firstOperand = null;
let waitingForSecond = false;
let currentOperator = null;
let errorFlag = false;

//Elemento DOM de la pantalla
const displayElement = document.getElementById("calculadoraPantalla");

function updateDisplay(){ // Metodo que actualiza la interfaz de la pantalla

let showValue = currentDisplay;
//Si el numero es muy largo en la pantalla.
if(showValue.length > 12){displayElement.value = showValue.slice(0,12)+"...";}
else{displayElement.value = showValue}
// Si da error.
if(currentDisplay = "Error"){displayElement.style.color = "#ff8a7a"; displayElement.style.fontWeight = "bold";}
else{displayElement.style.color = "#facc15"; displayElement.style.fontWeight = "500"}
    }

//Reset
function calculadoraReset(){
    currentDisplay = "0";
    firstOperand = null;
    waitingForSecond = false;
    currentOperator = null;
    errorFlag = false;
    updateDisplay();
}
//Formato a la cifra de numeros
function formatNumber(valor) {
        if (valor === "Error") return "Error";
        let num = parseFloat(valor);
        if (isNaN(num)) return "0";
        // Redondear
        let rounded = Math.round(num * 100000000) / 100000000;
        // Mostrar sin decimal si es numero entero.
        if (Number.isInteger(rounded)) return rounded.toString();
        // Legibilidad
        let str = rounded.toFixed(8).replace(/\.?0+$/, '');
        return str;
    }

//Base Matematica de la calculadora.
function calcula(operandoA, operandoB, operador){
    const a = parseFloat(operandoA);
    const b = parseFloat(operandoB);
    if(isNaN(a) || isNaN(b)) return "Error"; // Error sino son numeros.

switch(operador){
    case '+': return a+b;
    case '-': return a-b;
    case '*': return a*b;
    case '/': if(b===0) return "Error"; return a/b;
    default: return "Error";
    }

}
function handleOperator() {
        // Si hay un error activo, solo se puede limpiar, ignorar otras operaciones
    if (currentDisplay === "Error") {
        return;
    }
//****
        
if (currentOperator !== null && !waitingForSecond) {
    let result = calculate(firstOperand, currentDisplay, currentOperator);
    if (result === "Error") {
        currentDisplay = "Error";
        firstOperand = null;
        currentOperator = null;
        waitingForSecond = false;
        errorFlag = true;
        updateDisplay();
        return;
            }
            // Formato
            let formattedResult = formatNumber(result);
            currentDisplay = formattedResult;
            firstOperand = parseFloat(formattedResult);
            updateDisplay();
        } 
        else if (currentOperator === null && !waitingForSecond) {
            // Primer operador ingresado (sin operaciones previas)
            // actual como primer operando
            firstOperand = parseFloat(currentDisplay);
        }
        currentOperator = op;
        // Se espera el segundo operando
        waitingForSecond = true;
        // Siguiente número.
        // El próximo número reemplazará el display.
    }
// Función para agregar dígito al display (números del 0 al 9)
    function appendDigit(digit) {
        if (currentDisplay === "Error") {
            return;
        }

        
        if (waitingForSecond) {
            currentDisplay = digit;
            waitingForSecond = false;   //segundo operando
        } else {
            // Comportamiento normal concatenar excepto si es "0" inicial
            if (currentDisplay === "0") {
                currentDisplay = digit;
            } else {
                // Evita longitud excesiva (máximo 16 caracteres para usabilidad)
                if (currentDisplay.length < 18) {
                    currentDisplay += digit;
                }
            }
        }
        // Actualizar pantalla
        updateDisplay();
    }

    // Ejecutar operación "=" resultado final
    function computeResult() {
        // Si hay error actual, no se puede calcular
        if (currentDisplay === "Error") {
            return;
        }

       
        if (currentOperator !== null && !waitingForSecond && firstOperand !== null) {
            let secondValue = parseFloat(currentDisplay);
            let result = calculate(firstOperand, secondValue, currentOperator);
            
            if (result === "Error") {
                currentDisplay = "Error";
                firstOperand = null;
                currentOperator = null;
                waitingForSecond = false;
                errorFlag = true;
                updateDisplay();
                return;
            }
            
            // Formatear resultado limpio
            let formatted = formatNumber(result);
            currentDisplay = formatted;
            // Después de mostrar resultado, reset el estado de operación
            // para que el usuario pueda empezar nueva cuenta o seguir usando el resultado
            firstOperand = null;
            currentOperator = null;
            waitingForSecond = false;
            updateDisplay();
        } 
        else {
            // Si presiona igual sin operación completa, no hace nada (o mantiene pantalla)
            // pero opcional: si no hay operador, simplemente no pasa nada (comportamiento esperado)
            // Además si está en medio de espera pero no se ingresó segundo número, no debe hacer nada.
            return;
        }
    }

    // Función específica para el botón Clear (reinicia toda la calculadora)
    function clearAll() {
        resetCalculator();
    }

                                    // ----- EVENTOS (DOM) -----

    document.addEventListener("DOMContentLoaded", () => {
        // Botones numéricos (0-9) con clase .number y atributo data-digit
        const numberBtns = document.querySelectorAll(".number");
        numberBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const digit = btn.getAttribute("data-digit");
                if (digit !== null) {
                    appendDigit(digit);
                } else {
                    // Fallback: usar el texto interno para números
                    const text = btn.innerText.trim();
                    if (text.length === 1 && /[0-9]/.test(text)) {
                        appendDigit(text);
                    }
                }
            });
        });

        // Botones de operadores (+, -, *, /) clase .operator
        const operatorBtns = document.querySelectorAll(".operator");
        operatorBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.preventDefault();
                let op = btn.getAttribute("data-op");
                // Traducir los símbolos visuales a operadores reales
                if (op === "÷") op = "/";
                if (op === "×") op = "*";
                if (op === "−") op = "-";
                // Si no se define data-op, usar texto interno como backup
                if (!op) {
                    const raw = btn.innerText.trim();
                    if (raw === "÷") op = "/";
                    else if (raw === "×") op = "*";
                    else if (raw === "−") op = "-";
                    else if (raw === "+") op = "+";
                    else op = raw;
                }
                // Solo aceptar operadores validos
                if (op === "+" || op === "-" || op === "*" || op === "/") {
                    handleOperator(op);
                }
            });
        });

        // Botón de igual (resultado)
        const equalBtn = document.getElementById("equalBtn");
        if (equalBtn) {
            equalBtn.addEventListener("click", () => {
                computeResult();
            });
        }

        // Botón de limpiar (C)
        const clearBtn = document.getElementById("clearBtn");
        if (clearBtn) {
            clearBtn.addEventListener("click", () => {
                clearAll();
            });
        }

        // Extra: evitar cualquier comportamiento inesperado en el input de pantalla
        displayElement.addEventListener("focus", (e) => e.target.blur());
        
        // Inicialización asegurada
        resetCalculator();
    });
</script>

<style>
/* =========================

========================= */
body{

  display: grid;
  place-items: center;
  background: linear-gradient(135deg, #0b1220, #111827);

}

}

div{

}

/* =========================
   Selector de clase
========================= */

  width: min(380px, 92vw);
  padding: 16px;

  background: #0f172a;                 /* background general calculadora */
  border: 1px solid #334155;           /* borde general */
  box-shadow: 0 18px 40px rgba(0,0,0,0.35);
}

/* =========================
   Selector de id
========================= */
#calculadoraPantalla{
  width: 100%;
  box-sizing: border-box;
  margin: 6px 0 12px 0;
  padding: 12px 12px;
  border-radius: 12px;
  border: 1px solid #475569;           /* borde de pantalla */
  background: #0b1220;                 /* background pantalla */
  color: #facc15;                      /* color del texto */
  font-size: 30px;                     /* tamaño fuente pantalla */
  font-weight: 600;
  text-align: right;
  outline: none;
}

/* =========================
   Botones (selector de elemento)
========================= */
button{
  appearance: none;
  border: 1px solid #334155;           /* borde botones */
  background: #1f2937;                 /* fondo botones */
  color: #e5e7eb;
  border-radius: 12px;
  padding: 12px 10px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.05s ease, background 0.15s ease, border-color 0.15s ease;
}

/* Efectos */
button:hover{
  background: #273449;
  border-color: #475569;
}
button:active{
  transform: translateY(1px);
}

/* =========================
   Layout de botones
   (tu HTML no tiene grid contenedor para botones,
   así que lo resolvemos con grid dentro del contenedor)
========================= */
.calculadoraContenedor{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* Título ocupa 4 columnas */
.calculadoraContenedor > h1{
  grid-column: 1 / -1;
}

/* Pantalla ocupa 4 columnas */
.calculadoraContenedor > #calculadoraPantalla{
  grid-column: 1 / -1;
}

/* "UVEG" al final ocupa 4 columnas */
.calculadoraContenedor > div:last-of-type{
  grid-column: 1 / -1;
  margin-top: 6px;
  text-align: center;
  font-size: 12px;
  letter-spacing: 1.2px;
  color: #94a3b8;
}

/* =========================
   Botones por clase
========================= */
.numero{
  background: #111827;
}
.numero:hover{
  background: #1b2536;
}

/* Operadores */
.operador{
  background: #24324a;
  color: #e2e8f0;
}
.operador:hover{
  background: #2b3b57;
}

/* Limpiar (C) */
.clear{
  background: #3b1d2c;
  border-color: #7f1d1d;
  color: #fee2e2;
}
.clear:hover{
  background: #4a2134;
}

/* Igual (=) */
.resultadoIgual{
  background: #14532d;
  border-color: #166534;
  color: #dcfce7;
}

  background: #166534;
}

/* Hacer el "=" un poco más notorio */

/* Responsive: en pantallas chicas, ajustar un poco */
