<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Calculadora Básica | Proyecto JavaScript</title>
    <style>
        /* ----- ESTILOS GLOBALES (Selector de elemento) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita selección accidental de textos */
        }

        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* Contenedor principal de la calculadora (selector de clase) */
        .calculator-container {
            max-width: 500px;
            width: 100%;
            background: rgba(22, 30, 46, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 3rem;
            padding: 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(148, 163, 184, 0.1);
            transition: all 0.2s ease;
        }

        /* TITULO (selector de elemento H1) */
        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #f1f5f9;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, #fbbf24, #e2e8f0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            word-break: keep-all;
        }

        /* ---------- PANTALLA (selector de ID) ---------- */
        #display-screen {
            width: 100%;
            background: #0f1722;
            border: 2px solid #334155;
            border-radius: 2rem;
            padding: 1.2rem 1.5rem;
            font-size: 2.5rem;
            font-weight: 500;
            font-family: 'Courier New', 'Fira Code', monospace;
            text-align: right;
            color: #facc15;
            background-color: #020617;
            box-shadow: inset 0 5px 8px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255, 255, 255, 0.05);
            letter-spacing: 2px;
            margin-bottom: 2rem;
            outline: none;
            cursor: default;
            transition: 0.1s linear;
            overflow-x: auto;
            white-space: nowrap;
        }

        /* Personalización del scroll horizontal en pantalla (opcional) */
        #display-screen::-webkit-scrollbar {
            height: 4px;
        }

        /* ---------- GRID DE BOTONES ---------- */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.9rem;
        }

        /* Estilos base de TODOS los botones (selector de elemento button) */
        button {
            font-size: 1.8rem;
            font-weight: 600;
            padding: 1rem 0;
            border: none;
            border-radius: 2rem;
            background: #1e293b;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.1s ease-in-out;
            box-shadow: 0 5px 0 #0f1722;
            font-family: inherit;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f1722;
        }

        /* Diferenciación por clases: números (clase .number) */
        button.number {
            background: #2d3a4e;
            color: #f1f5f9;
            font-weight: 600;
            box-shadow: 0 5px 0 #1e2a3a;
        }

        button.number:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1e2a3a;
        }

        /* Botones de operadores (clase .operator) */
        button.operator {
            background: #b45309;
            color: #ffedd5;
            font-size: 2rem;
            box-shadow: 0 5px 0 #78350f;
        }

        button.operator:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #78350f;
        }

        /* Botón especial limpiar C (clase .clear) */
        button.clear {
            background: #dc2626;
            color: #fef2f2;
            font-weight: bold;
            font-size: 1.8rem;
            box-shadow: 0 5px 0 #991b1b;
        }

        button.clear:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #991b1b;
        }

        /* Botón igual / resultado (clase .equal) */
        button.equal {
            background: #16a34a;
            color: white;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 5px 0 #14532d;
            grid-column: span 1;
        }

        button.equal:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #14532d;
        }

        /* Efecto hover suave (mejora experiencia escritorio) */
        button:hover {
            filter: brightness(1.08);
        }

        /* Ajustes para el botón 0 puede ocupar espacio extra pero lo dejamos normal */
        /* Responsive: pantallas pequeñas */
        @media (max-width: 480px) {
            .calculator-container {
                padding: 1.2rem;
            }
            button {
                font-size: 1.5rem;
                padding: 0.8rem 0;
            }
            #display-screen {
                font-size: 1.8rem;
                padding: 1rem 1.2rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .buttons-grid {
                gap: 0.7rem;
            }
        }

        /* Estilo especial para el botón división y multiplicación */
        .operator span {
            font-weight: bold;
        }

        /* Footer decorativo no solicitado pero armoniza */
        .credit {
            text-align: center;
            margin-top: 1.4rem;
            font-size: 0.7rem;
            color: #5b6e8c;
            font-family: monospace;
        }
    </style>
</head>

<body>
<div class="calculator-container">
    <!-- Título solicitado -->
    <h1>Calculadora básica</h1>

    <!-- Pantalla de visualización (campo de texto readonly) -->
    <input type="text" id="display-screen" readonly aria-label="Pantalla de resultados" value="0">

    <!-- Panel de botones -->
    <div class="buttons-grid">
        <!-- Fila 1: 7 8 9 / -->
        <button class="number" data-digit="7">7</button>
        <button class="number" data-digit="8">8</button>
        <button class="number" data-digit="9">9</button>
        <button class="operator" data-op="/">÷</button>

        <!-- Fila 2: 4 5 6 * -->
        <button class="number" data-digit="4">4</button>
        <button class="number" data-digit="5">5</button>
        <button class="number" data-digit="6">6</button>
        <button class="operator" data-op="*">×</button>

        <!-- Fila 3: 1 2 3 - -->
        <button class="number" data-digit="1">1</button>
        <button class="number" data-digit="2">2</button>
        <button class="number" data-digit="3">3</button>
        <button class="operator" data-op="-">−</button>

        <!-- Fila 4: 0 C = + -->
        <button class="number" data-digit="0">0</button>
        <button class="clear" id="clearBtn">C</button>
        <button class="equal" id="equalBtn">=</button>
        <button class="operator" data-op="+">+</button>
    </div>
    <div class="credit">✦ operaciones básicas | C limpia todo ✦</div>
</div>

<script>
    // ---------- LÓGICA DE LA CALCULADORA (ESTADO) ----------
    // Variables de control
    let currentDisplay = "0";      // Valor que se muestra en pantalla
    let firstOperand = null;        // Primer número (operando)
    let waitingForSecond = false;   // ¿Esperando el segundo operando después de operador?
    let currentOperator = null;      // Operador pendiente (+, -, *, /)
    let errorFlag = false;           // Control de estado error (división por cero)

    // Elemento DOM de la pantalla
    const displayElement = document.getElementById("display-screen");

    // Función para actualizar la interfaz de la pantalla
    function updateDisplay() {
        // Limitar longitud visual para no desbordar, pero mantiene integridad
        let showValue = currentDisplay;
        if (showValue.length > 18) {
            // Si es muy largo pero no es error, acortar visualmente sin modificar el valor interno
            // solo para mejorar UX (sigue funcionando correctamente)
            displayElement.value = showValue.slice(0, 18) + "...";
        } else {
            displayElement.value = showValue;
        }
        // Por si el contenido es Error, le aplicamos estilo adicional desde js? opcional.
        if (currentDisplay === "Error") {
            displayElement.style.color = "#ff8a7a";
            displayElement.style.fontWeight = "bold";
        } else {
            displayElement.style.color = "#facc15";
            displayElement.style.fontWeight = "500";
        }
    }

    // Reinicio completo (limpiar todo el estado)
    function resetCalculator() {
        currentDisplay = "0";
        firstOperand = null;
        waitingForSecond = false;
        currentOperator = null;
        errorFlag = false;
        updateDisplay();
    }

    // Función para formatear números (evita decimales excesivos y redondeos elegantes)
    function formatNumber(value) {
        if (value === "Error") return "Error";
        // Si es número flotante con muchos decimales
        let num = parseFloat(value);
        if (isNaN(num)) return "0";
        // Redondear a máximo 8 decimales, eliminar ceros innecesarios
        let rounded = Math.round(num * 100000000) / 100000000;
        // Si es entero, mostrar sin decimal
        if (Number.isInteger(rounded)) return rounded.toString();
        // Para evitar notación científica y mantener legibilidad
        let str = rounded.toFixed(8).replace(/\.?0+$/, '');
        return str;
    }

    // Operación matemática principal
    function calculate(operandA, operandB, operator) {
        const a = parseFloat(operandA);
        const b = parseFloat(operandB);
        if (isNaN(a) || isNaN(b)) return "Error";

        switch (operator) {
            case '+':
                return a + b;
            case '-':
                return a - b;
            case '*':
                return a * b;
            case '/':
                if (b === 0) return "Error";
                return a / b;
            default:
                return "Error";
        }
    }

    // Función ejecutada cuando se presiona un operador (+, -, *, /)
    function handleOperator(op) {
        // Si hay un error activo, solo se puede limpiar, ignorar otras operaciones
        if (currentDisplay === "Error") {
            return;
        }

        // Si ya existe un operador pendiente y NO estamos esperando segundo operando,
        // significa que tenemos (primer operando + operador + segundo operando ya ingresado)
        // por lo tanto, resolvemos la operación antes de cambiar el operador.
        if (currentOperator !== null && !waitingForSecond) {
            // Tenemos primero y segundo (currentDisplay es el segundo)
            let result = calculate(firstOperand, currentDisplay, currentOperator);
            if (result === "Error") {
                currentDisplay = "Error";
                firstOperand = null;
                currentOperator = null;
                waitingForSecond = false;
                errorFlag = true;
                updateDisplay();
                return;
            }
            // Formateamos resultado
            let formattedResult = formatNumber(result);
            currentDisplay = formattedResult;
            firstOperand = parseFloat(formattedResult);
            updateDisplay();
        } 
        else if (currentOperator === null && !waitingForSecond) {
            // Primer operador ingresado (sin operaciones previas)
            // Guardamos el número actual como primer operando
            firstOperand = parseFloat(currentDisplay);
        }
        
        // Actualizamos el nuevo operador
        currentOperator = op;
        // Indicamos que ahora se espera el segundo operando
        waitingForSecond = true;
        // No reseteamos el display, sólo esperamos el siguiente número.
        // El próximo número reemplazará el display.
    }

    // Función para agregar dígito al display (números del 0 al 9)
    function appendDigit(digit) {
        // Si estamos en estado de error, ignoramos la entrada (a menos que se limpie con C)
        if (currentDisplay === "Error") {
            return;
        }

        // Si estamos esperando el segundo operando (después de un operador), 
        // reemplazamos completamente el contenido de la pantalla 
        if (waitingForSecond) {
            currentDisplay = digit;
            waitingForSecond = false;   // Ya hemos comenzado a escribir segundo operando
        } else {
            // Comportamiento normal: concatenar excepto si es "0" inicial
            if (currentDisplay === "0") {
                currentDisplay = digit;
            } else {
                // Evitar longitud excesiva (máximo 16 caracteres para usabilidad)
                if (currentDisplay.length < 18) {
                    currentDisplay += digit;
                }
            }
        }
        // Actualizar pantalla
        updateDisplay();
    }

    // Ejecutar operación "=" resultado final
    function computeResult() {
        // Si hay error actual, no se puede calcular
        if (currentDisplay === "Error") {
            return;
        }

        // Solamente si tenemos operador y no estamos esperando segundo operando (osea ya hay un segundo número escrito)
        // además de existir firstOperand
        if (currentOperator !== null && !waitingForSecond && firstOperand !== null) {
            let secondValue = parseFloat(currentDisplay);
            let result = calculate(firstOperand, secondValue, currentOperator);
            
            if (result === "Error") {
                currentDisplay = "Error";
                firstOperand = null;
                currentOperator = null;
                waitingForSecond = false;
                errorFlag = true;
                updateDisplay();
                return;
            }
            
            // Formatear resultado limpio
            let formatted = formatNumber(result);
            currentDisplay = formatted;
            // Después de mostrar resultado, reseteamos el estado de operación
            // para que el usuario pueda empezar nueva cuenta o seguir usando el resultado
            firstOperand = null;
            currentOperator = null;
            waitingForSecond = false;
            updateDisplay();
        } 
        else {
            // Si presiona igual sin operación completa, no hace nada (o mantiene pantalla)
            // pero opcional: si no hay operador, simplemente no pasa nada (comportamiento esperado)
            // Además si está en medio de espera pero no se ingresó segundo número, no debe hacer nada.
            return;
        }
    }

    // Función específica para el botón Clear (reinicia toda la calculadora)
    function clearAll() {
        resetCalculator();
    }

    // ----- ASIGNACIÓN DE EVENTOS (DOM) -----
    document.addEventListener("DOMContentLoaded", () => {
        // Botones numéricos (0-9) con clase .number y atributo data-digit
        const numberBtns = document.querySelectorAll(".number");
        numberBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const digit = btn.getAttribute("data-digit");
                if (digit !== null) {
                    appendDigit(digit);
                } else {
                    // Fallback: usar el texto interno para números
                    const text = btn.innerText.trim();
                    if (text.length === 1 && /[0-9]/.test(text)) {
                        appendDigit(text);
                    }
                }
            });
        });

        // Botones de operadores (+, -, *, /) clase .operator
        const operatorBtns = document.querySelectorAll(".operator");
        operatorBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.preventDefault();
                let op = btn.getAttribute("data-op");
                // Traducir los símbolos visuales a operadores reales
                if (op === "÷") op = "/";
                if (op === "×") op = "*";
                if (op === "−") op = "-";
                // Si no se define data-op, usar texto interno como backup
                if (!op) {
                    const raw = btn.innerText.trim();
                    if (raw === "÷") op = "/";
                    else if (raw === "×") op = "*";
                    else if (raw === "−") op = "-";
                    else if (raw === "+") op = "+";
                    else op = raw;
                }
                // Solo aceptar operadores validos
                if (op === "+" || op === "-" || op === "*" || op === "/") {
                    handleOperator(op);
                }
            });
        });

        // Botón de igual (resultado)
        const equalBtn = document.getElementById("equalBtn");
        if (equalBtn) {
            equalBtn.addEventListener("click", () => {
                computeResult();
            });
        }

        // Botón de limpiar (C)
        const clearBtn = document.getElementById("clearBtn");
        if (clearBtn) {
            clearBtn.addEventListener("click", () => {
                clearAll();
            });
        }

        // Extra: evitar cualquier comportamiento inesperado en el input de pantalla
        displayElement.addEventListener("focus", (e) => e.target.blur());
        
        // Inicialización asegurada
        resetCalculator();
    });
</script>
</body>
</html>
